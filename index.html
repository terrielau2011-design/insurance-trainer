<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保險產品對比與財務演算工具 V2</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.2/dist/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- 版本浮層 -->
<div id="version-badge">V2.0</div>

<header class="app-header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-icon">🛡</span>
      <div>
        <h1>保險產品對比與財務演算工具</h1>
        <p>Insurance Product Comparison & Financial Calculator <span class="version-tag">V2.0</span></p>
      </div>
    </div>
  </div>
</header>

<main class="app-main">

  <!-- ═══ 模塊1：客戶需求標籤篩選 ═══ -->
  <section class="section-card" id="section-tags" style="display:none;">
    <div class="section-header">
      <span class="section-badge">1</span>
      <h2>客戶需求標籤篩選</h2>
    </div>
    <div class="tags-container" id="tags-container"></div>
  </section>

  <!-- ═══ 模塊2：產品多維對比 ═══ -->
  <section class="section-card" id="section-products">
    <div class="section-header">
      <span class="section-badge">2</span>
      <h2>產品選擇與多維對比</h2>
      <span class="hint-text" style="margin-left:auto;">最多選4款加入對比</span>
    </div>
    <div class="product-grid" id="product-grid"></div>
  </section>

  <!-- 對比表 -->
  <section class="section-card" id="section-compare" style="display:none;">
    <div class="section-header">
      <span class="section-badge">⚖</span>
      <h2>跨產品對比表</h2>
    </div>
    <div class="table-wrapper">
      <table class="compare-table" id="compare-table">
        <thead><tr id="compare-thead"></tr></thead>
        <tbody id="compare-tbody"></tbody>
      </table>
    </div>
  </section>

  <!-- ═══ 模塊3：動態圖表 ═══ -->
  <section class="section-card" id="section-charts" style="display:none;">
    <div class="section-header">
      <span class="section-badge">3</span>
      <h2>動態財務圖表</h2>
      <div class="product-dropdown">
        <select id="chart-product-select" class="select-field" onchange="onChartProductChange()"></select>
      </div>
    </div>

    <!-- 3a 繳費構成餅圖 -->
    <div class="chart-block" id="block-pie" style="display:none;">
      <h3 class="chart-title">🥧 繳費構成餅圖</h3>
      <div id="chart-pie" style="width:100%;height:300px;"></div>
    </div>

    <!-- 3b 財富走勢圖 -->
    <div class="chart-block" id="block-wealth" style="display:none;">
      <h3 class="chart-title">📈 財富走勢圖</h3>
      <div class="chart-controls">
        <label><input type="checkbox" id="show-pessimistic" onchange="updateWealthChart()"> 顯示悲觀場景</label>
        <label><input type="checkbox" id="show-optimistic" onchange="updateWealthChart()"> 顯示樂觀場景</label>
        <label>目標金額：<input type="number" id="target-amount" value="2000000" min="0" step="100000" oninput="updateWealthChart()" style="width:120px;"></label>
      </div>
      <div id="chart-wealth" style="width:100%;height:400px;"></div>
    </div>

    <!-- 3c 跨資產柱圖 -->
    <div class="chart-block" id="block-opp" style="display:none;">
      <h3 class="chart-title">📊 跨資產機會成本對比</h3>
      <div id="chart-opp" style="width:100%;height:400px;"></div>
    </div>
  </section>

  <!-- ═══ 模塊4：廣發融資演算 ═══ -->
  <section class="section-card" id="section-financing" style="display:none;">
    <div class="section-header">
      <span class="section-badge">4</span>
      <h2>廣發銀行保費融資演算</h2>
      <div class="scene-toggle">
        <button class="toggle-btn active" id="btn-normal" onclick="switchFinScene('normal')">正常場景</button>
        <button class="toggle-btn" id="btn-pessimistic" onclick="switchFinScene('pessimistic')">悲觀場景</button>
      </div>
    </div>

    <div class="fin-input-row">
      <label>保費（USD）</label>
      <input type="number" id="fin-premium" value="200000" min="200000" step="10000" oninput="calcFinancing()" />
    </div>

    <div class="fin-results" id="fin-results"></div>

    <div class="fin-compare-table" id="fin-compare"></div>
  </section>

  <!-- ═══【V2報告模塊】PDF報告生成 ═══ -->
  <section class="section-card" id="section-report">
    <div class="section-header">
      <span class="section-badge">5</span>
      <h2>客戶投保明白備忘錄</h2>
      <span class="section-tag">V2 報告</span>
    </div>

    <!-- 報告控制欄 -->
    <div class="report-toolbar">
      <select id="report-version" class="select-field">
        <option value="client">客戶簡報版</option>
        <option value="professional">專業顧問版</option>
      </select>
      <button class="btn btn-primary" id="btn-generate-report" onclick="generateReport()" disabled>📋 生成報告</button>
      <span id="report-status" class="report-status"></span>
    </div>

    <!-- 報告預覽區（隱藏，生成 PDF 時用） -->
    <div id="report-preview" style="display:none;"></div>
  </section>

</main>

<footer class="app-footer">
  <p>⚠️ 本系統僅供持牌保險從業員內部培訓使用，所有數據計算僅供參考，不構成任何投保或財務建議。</p>
</footer>

<script src="productData.js"></script>
<script src="finConfig.js"></script>
<script src="chartConfig.js"></script>
<script src="main.js"></script>
</body>
</html>
