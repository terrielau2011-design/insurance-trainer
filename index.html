  { tag_name: "短期儲蓄", 篩選規則: "break_year ≤ 10，回本速度快" },

  { tag_name: "退休規劃", 篩選規則: "長期持有價值高、20年期IRR表現優、適合長線持有" },
  { tag_name: "整付入場", 篩選規則: "pay_term = 0（躉繳/整付）" },
  { tag_name: "分期入場", 篩選規則: "pay_term ≥ 1 且 pay_term ≤ 10（分期繳費）" },
  { tag_name: "教育基金", 篩選規則: "中期回本、彈性提取現金價值、適合10–20年規劃" },
  { tag_name: "小額入場", 篩選規則: "min_prem ＜ 20000，低門檻投保" }
];

function filterProducts(selectedTags) {
  if (!selectedTags || selectedTags.length === 0) return PRODUCTS;
  return PRODUCTS.filter(p => selectedTags.every(t => p.tag_list.includes(t)));
}

function renderTags() {
  const container = document.getElementById('tagContainer');
  container.innerHTML = TAGS.map(t => `
    <label class="tag-label">
      <input type="checkbox" value="${t.tag_name}" onchange="onFilterChange()">
      <span>${t.tag_name}</span>
    </label>
    <div class="tag-rule">${t.篩選規則}</div>
  `).join('');
}

function getSelectedTags() {
  return Array.from(document.querySelectorAll('.tag-label input:checked')).map(el => el.value);
}

function formatVal(v, suffix) {
  if (!v || v === '待補') return '<span class="metric-value tbd">待補</span>';
  return '<span class="metric-value">' + v + (suffix || '') + '</span>';
}

function renderProducts() {
  const selected = getSelectedTags();
  const list = filterProducts(selected);
  const container = document.getElementById('productContainer');
  const header = document.getElementById('resultHeader');
  const statShown = document.getElementById('stat-shown');
  const statFilter = document.getElementById('stat-filter');

  if (list.length === 0) {
    container.innerHTML = '<div class="no-result">無符合條件的產品，請調整標籤組合</div>';
    header.textContent = '顯示 0 款產品';
  } else {
    container.innerHTML = list.map(p => {
      const chips = p.tag_list.map(t => '<span class="tag-chip">' + t + '</span>').join('');
      const financeClass = p.finance_support === '是' ? '' : 'no';
      return '<div class="product-card">' +
        '<div class="card-head">' +
          '<div>' +
            '<div class="prod-title">' + p.prod_name + '</div>' +
            '<div class="prod-meta">' + p.ins_name + ' ｜ ' + p.prod_id + '</div>' +
          '</div>' +
          '<div class="finance-tag ' + financeClass + '">保費融資</div>' +
        '</div>' +
        '<div class="metrics">' +
          '<div class="metric"><div class="metric-label">最低保費</div>' + formatVal(p.min_prem) + '</div>' +
          '<div class="metric"><div class="metric-label">繳費年期</div>' + formatVal(p.pay_term) + '</div>' +
          '<div class="metric"><div class="metric-label">回本年</div>' + formatVal(p.break_year) + '</div>' +
          '<div class="metric"><div class="metric-label">IRR 20年</div>' + formatVal(p.irr_20, '%') + '</div>' +
        '</div>' +
        '<div class="tag-list">' + chips + '</div>' +
        '<div class="feature-text">' + p.feature_short + '</div>' +
        '<div class="influencer-block">' +
          '<div class="point">★ ' + p.influencer_point + '</div>' +
          '<div class="scene">' + p.scene_desc + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
    header.textContent = '顯示 ' + list.length + ' 款產品';
  }
  statShown.textContent = list.length === PRODUCTS.length ? '顯示全部' : '篩選後 ' + list.length + ' 款';
  statFilter.textContent = selected.length === 0 ? '未啟用篩選' : '已選 ' + selected.length + ' 個標籤：' + selected.join('、');
}

function onFilterChange() { renderProducts(); }

document.getElementById('clearBtn').addEventListener('click', function() {
  document.querySelectorAll('.tag-label input').forEach(function(el) { el.checked = false; });
  renderProducts();
});

renderTags();
renderProducts();
</script>
